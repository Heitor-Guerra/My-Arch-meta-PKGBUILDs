# ~/.config/yazi/yazi.toml
[mgr]
linemode = "size_and_mtime"

[plugin]
prepend_preloaders = [
    # Replace magick, image, video with mediainfo
]
prepend_previewers = [
    # Replace magick, image, video with mediainfo

    { url = "*.md", run = "nvim" },
]

[opener]
edit = [
  { run = 'nvim "$@"', block = true },
]

play = [
  { run = 'mpv "$@"', orphan = true, for = "unix"},
]
